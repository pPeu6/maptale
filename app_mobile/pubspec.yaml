name: app_mobile
description: "App mobile de escaneamento AR de ambientes - gera o JSON compartilhado do Maptale."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ar_flutter_plugin_plus: ^1.1.3
  vector_math: ^2.1.4
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
